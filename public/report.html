<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Inventory Report</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f9fafb; 
            color: #333; 
            padding: 20px; 
            margin: 0;
        }

        .container { 
            max-width: 800px; 
            margin: 40px auto; 
            background: #ffffff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 { 
            text-align: center;
            color: #111827;
            font-weight: 600;
            border-bottom: 2px solid #f3f4f6; 
            padding-bottom: 20px; 
            margin-bottom: 30px;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            color: #6b7280;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            background: #f3f4f6;
            padding: 10px 15px;
            border-radius: 6px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        th, td { 
            padding: 15px 20px; 
            text-align: left; 
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #f9fafb;
            color: #4b5563;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        .product-name {
            font-weight: 500;
            color: #1f2937;
        }

        .qty-cell {
            text-align: right;
            font-size: 16px;
            font-weight: 600;
            color: #3b82f6;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        
        .badge {
            background-color: #dcfce7;
            color: #166534;
            padding: 4px 8px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Live Inventory Report</h1>
        
        <div class="header-info">
            <span><span class="badge">Live</span> Auto-updating</span>
            <span id="time"></span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th style="text-align: right;">Units Available</th>
                </tr>
            </thead>
            <tbody id="reportBody">
                <tr><td colspan="2" class="empty-state">Connecting to database...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function updateTime() {
            document.getElementById('time').innerText = "Last Updated: " + new Date().toLocaleTimeString();
        }
        
        async function loadReport() {
            try {
                const res = await fetch('/api/inventory');
                if (!res.ok) throw new Error("API Error");
                const data = await res.json();
                
                const tbody = document.getElementById('reportBody');
                
                if(!data || data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='2' class='empty-state'>No stock data available</td></tr>";
                    updateTime();
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="product-name">${item.name}</td>
                            <td class="qty-cell">${item.quantity}</td>
                        </tr>
                    `;
                });
                updateTime();
            } catch (e) {
                document.getElementById('reportBody').innerHTML = `<tr><td colspan="2" class="empty-state" style="color: #ef4444;">Failed to load data. API connection issue.</td></tr>`;
            }
        }
        
        loadReport();
        setInterval(loadReport, 10000);
    </script>
</body>
</html>
