<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * {
            box-sizing: border-box;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; 
            color: #333; 
            padding: 15px; 
            margin: 0;
        }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: #ffffff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 { 
            color: #1f2937;
            font-size: 22px;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb; 
            padding-bottom: 15px; 
            margin-top: 0;
            margin-bottom: 25px;
        }

        .panel {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .panel-title {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 15px;
            display: block;
            font-size: 16px;
        }

        .form-group { 
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"], input[type="number"] { 
            background: #ffffff; 
            border: 1px solid #d1d5db; 
            border-radius: 6px;
            color: #1f2937; 
            padding: 12px 15px; 
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button { 
            background: #3b82f6; 
            color: #ffffff; 
            border: none;
            border-radius: 6px;
            padding: 12px 20px; 
            cursor: pointer; 
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        button:hover { 
            background: #2563eb; 
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            background: #ffffff;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 500px;
        }

        th, td { 
            border-bottom: 1px solid #e5e7eb; 
            padding: 15px; 
            text-align: left; 
            font-size: 14px;
        }

        th {
            background-color: #f9fafb;
            color: #6b7280;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Quantity Control Styles */
        .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-cell {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            min-width: 30px;
            text-align: center;
        }

        .btn-qty {
            background: #f3f4f6;
            color: #4b5563;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-qty:hover {
            background: #e5e7eb;
            color: #1f2937;
            border-color: #9ca3af;
        }

        .btn-qty:active {
            transform: scale(0.95);
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            font-size: 14px;
            color: #6b7280;
        }

        a { 
            color: #3b82f6; 
            text-decoration: none; 
            font-weight: 500;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        #status-msg {
            font-size: 14px;
            margin-top: 12px;
            display: block;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .form-group { flex-direction: column; align-items: stretch; }
            #itemQty { width: 100% !important; }
            .btn-add { width: 100%; padding: 14px; }
            .container { padding: 15px; }
            .footer-links { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inventory Management System</h1>
        
        <div class="panel">
            <span class="panel-title">Add New Item</span>
            <div class="form-group">
                <input type="text" id="itemName" placeholder="Enter item name (e.g., Laptop)">
                <input type="number" id="itemQty" placeholder="Qty" value="0" style="width: 120px;">
                <button class="btn-add" onclick="addItem()">Add to Inventory</button>
            </div>
            <span id="status-msg"></span>
        </div>

        <div class="panel" style="background: #ffffff; padding: 0; border: none;">
            <span class="panel-title" style="padding: 0 5px;">Current Stock Level</span>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Product Name</th>
                            <th>Quantity</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        <tr><td colspan="3" style="text-align:center; color: #6b7280; padding: 30px;">Loading database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="footer-links">
            <span>System Status: <span style="color: #10b981; font-weight: 600;">Online</span></span>
            <a href="report.html" target="_blank">View Public Report &rarr;</a>
        </div>
    </div>

    <script>
        async function loadInventory() {
            try {
                const res = await fetch('/api/inventory');
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || "Failed to fetch from API.");
                }
                const data = await res.json();
                
                const tbody = document.getElementById('inventoryBody');
                tbody.innerHTML = '';
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color: #6b7280; padding: 30px;">No items found. Add one above.</td></tr>';
                    return;
                }
                
                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td style="color:#6b7280; width: 60px;">#${item.id}</td>
                            <td style="font-weight: 500; color:#1f2937;">${item.name}</td>
                            <td>
                                <div class="qty-control">
                                    <button class="btn-qty" onclick="updateQty(${item.id}, -1)">−</button>
                                    <span class="qty-cell" id="qty-${item.id}">${item.quantity}</span>
                                    <button class="btn-qty" onclick="updateQty(${item.id}, 1)">+</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                document.getElementById('inventoryBody').innerHTML = `<tr><td colspan="3" style="text-align:center; color: #ef4444; padding: 30px; font-weight: 500;">API Error: ${e.message}</td></tr>`;
            }
        }

        async function addItem() {
            const name = document.getElementById('itemName').value;
            const qty = document.getElementById('itemQty').value;
            const status = document.getElementById('status-msg');
            
            if(!name) {
                status.innerText = "Please enter an item name.";
                status.style.color = "#ef4444";
                return;
            }
            
            status.innerText = "Processing...";
            status.style.color = "#3b82f6";
            
            try {
                const res = await fetch('/api/inventory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, quantity: qty })
                });
                
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || "Failed to add item.");
                }
                
                document.getElementById('itemName').value = '';
                document.getElementById('itemQty').value = '0';
                status.innerText = "Item added successfully!";
                status.style.color = "#10b981";
                setTimeout(() => status.innerText = "", 3000);
                
                loadInventory();
            } catch (e) {
                status.style.color = "#ef4444";
                status.innerText = "Error: " + e.message;
            }
        }

        async function updateQty(id, delta) {
            const qtyElement = document.getElementById(`qty-${id}`);
            const originalQty = parseInt(qtyElement.innerText);
            
            qtyElement.innerText = "...";
            
            try {
                const res = await fetch(`/api/inventory/${id}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ delta })
                });
                
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || "Update failed");
                }
                
                const data = await res.json();
                qtyElement.innerText = data.newQuantity;
            } catch (e) {
                alert("Error: " + e.message);
                qtyElement.innerText = originalQty;
            }
        }

        loadInventory();
    </script>
</body>
</html>
