<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; 
            color: #333; 
            padding: 20px; 
            margin: 0;
        }

        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            background: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 { 
            color: #1f2937;
            font-size: 24px;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb; 
            padding-bottom: 15px; 
            margin-bottom: 30px;
        }

        .panel {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .panel-title {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 15px;
            display: block;
            font-size: 16px;
        }

        .form-group { 
            display: flex;
            gap: 15px;
            align-items: center;
        }

        input[type="text"], input[type="number"] { 
            background: #ffffff; 
            border: 1px solid #d1d5db; 
            border-radius: 4px;
            color: #1f2937; 
            padding: 10px 12px; 
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button { 
            background: #3b82f6; 
            color: #ffffff; 
            border: none;
            border-radius: 4px;
            padding: 10px 20px; 
            cursor: pointer; 
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        button:hover { 
            background: #2563eb; 
        }

        .btn-add { flex-shrink: 0; }

        .btn-inc { background: #10b981; padding: 6px 12px; font-size: 13px; }
        .btn-dec { background: #ef4444; padding: 6px 12px; font-size: 13px; }
        .btn-inc:hover { background: #059669; }
        .btn-dec:hover { background: #dc2626; }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            background: #ffffff;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        th, td { 
            border-bottom: 1px solid #e5e7eb; 
            padding: 12px 15px; 
            text-align: left; 
            font-size: 14px;
        }

        th {
            background-color: #f9fafb;
            color: #6b7280;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .qty-cell {
            font-size: 15px;
            font-weight: 600;
            color: #1f2937;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            font-size: 14px;
            color: #6b7280;
        }

        a { 
            color: #3b82f6; 
            text-decoration: none; 
            font-weight: 500;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        #status-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inventory Management System</h1>
        
        <div class="panel">
            <span class="panel-title">Add New Item</span>
            <div class="form-group">
                <input type="text" id="itemName" placeholder="Enter item name (e.g., Laptop, Mouse)">
                <input type="number" id="itemQty" placeholder="Qty" value="0" style="width: 100px;">
                <button class="btn-add" onclick="addItem()">Add to Inventory</button>
            </div>
            <span id="status-msg"></span>
        </div>

        <div class="panel" style="background: #ffffff;">
            <span class="panel-title">Current Stock Level</span>
            <table>
                <thead>
                    <tr>
                        <th>Item ID</th>
                        <th>Product Name</th>
                        <th>Available Stock</th>
                        <th>Manage Stock</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    <tr><td colspan="4" style="text-align:center; color: #6b7280; padding: 30px;">Loading database...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer-links">
            <span>System Status: <span style="color: #10b981; font-weight: 500;">Online</span></span>
            <a href="report.html" target="_blank">View Public Report &rarr;</a>
        </div>
    </div>

    <script>
        async function loadInventory() {
            try {
                const res = await fetch('/api/inventory');
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || "Failed to fetch from API. Check Supabase setup.");
                }
                const data = await res.json();
                
                const tbody = document.getElementById('inventoryBody');
                tbody.innerHTML = '';
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: #6b7280; padding: 30px;">No items found in database. Add one above.</td></tr>';
                    return;
                }
                
                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td style="color:#6b7280;">#${item.id}</td>
                            <td style="font-weight: 500; color:#1f2937;">${item.name}</td>
                            <td class="qty-cell" id="qty-${item.id}">${item.quantity}</td>
                            <td class="actions">
                                <button class="btn-inc" onclick="updateQty(${item.id}, 1)">+ Add</button>
                                <button class="btn-dec" onclick="updateQty(${item.id}, -1)">- Remove</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                document.getElementById('inventoryBody').innerHTML = `<tr><td colspan="4" style="text-align:center; color: #ef4444; padding: 20px;">API Error: ${e.message}</td></tr>`;
            }
        }

        async function addItem() {
            const name = document.getElementById('itemName').value;
            const qty = document.getElementById('itemQty').value;
            const status = document.getElementById('status-msg');
            
            if(!name) {
                status.innerText = "Please enter an item name.";
                return;
            }
            
            status.innerText = "Processing...";
            status.style.color = "#3b82f6";
            
            try {
                const res = await fetch('/api/inventory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, quantity: qty })
                });
                
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || "Failed to add item. Check Supabase connection.");
                }
                
                document.getElementById('itemName').value = '';
                document.getElementById('itemQty').value = '0';
                status.innerText = "Item added successfully!";
                status.style.color = "#10b981";
                setTimeout(() => status.innerText = "", 3000);
                
                loadInventory();
            } catch (e) {
                status.style.color = "#ef4444";
                status.innerText = "API Error: " + e.message;
            }
        }

        async function updateQty(id, delta) {
            const qtyElement = document.getElementById(`qty-${id}`);
            const originalQty = parseInt(qtyElement.innerText);
            
            qtyElement.innerText = "...";
            
            try {
                const res = await fetch(`/api/inventory/${id}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ delta })
                });
                
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || "Update failed");
                }
                
                const data = await res.json();
                qtyElement.innerText = data.newQuantity;
            } catch (e) {
                alert("API Error: " + e.message);
                qtyElement.innerText = originalQty;
            }
        }

        loadInventory();
    </script>
</body>
</html>
