<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Barkat's Heaven - Cold Drink Inventory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#f5f0eb;min-height:100vh;color:#2c1810}
.header{background:linear-gradient(135deg,#1a3c34,#2d6a4f);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.logo{width:40px;height:40px;background:#f5d061;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header h1{font-size:1.15rem;font-weight:600}
.ctr{max-width:960px;margin:16px auto;padding:0 14px}
.nav{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.nav button{background:#fff;border:2px solid #b8d4c8;padding:7px 16px;border-radius:18px;cursor:pointer;font-size:.8rem;font-weight:500;color:#1a3c34;transition:.2s}
.nav button:hover,.nav button.active{background:#1a3c34;color:#fff;border-color:#1a3c34}
.crd{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:12px}
.crd h2{font-size:.95rem;margin-bottom:10px;color:#1a3c34}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.dc{background:#f4faf6;border:1px solid #c8e0d4;border-radius:10px;padding:10px;text-align:center}
.dc:hover{border-color:#7fb8a0}
.dc .nm{font-weight:600;font-size:.84rem;margin:2px 0}
.dc .st{font-size:1.1rem;font-weight:700;margin-top:4px}
.dc.st-ok .st{color:#2d6a4f}
.dc.st-low .st{color:#c77d00}
.dc.st-out .st{color:#c0392b}
.dc .acts{display:flex;gap:4px;margin-top:6px;justify-content:center;align-items:center}
.dc .acts input{width:50px;padding:4px;border:2px solid #c8e0d4;border-radius:6px;font-size:.8rem;text-align:center}
.dc .acts button{padding:4px 10px;border-radius:8px;border:none;cursor:pointer;font-size:.7rem;background:#1a3c34;color:#fff}
.dc .acts button:hover{background:#0f2a23}
.row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.row label{font-size:.78rem;font-weight:600;min-width:50px;color:#1a3c34}
.row input,.row select{flex:1;min-width:120px;padding:7px 10px;border:2px solid #c8e0d4;border-radius:8px;font-size:.84rem;background:#fff}
.row input:focus,.row select:focus{outline:none;border-color:#2d6a4f}
.btn{background:#1a3c34;color:#fff;border:none;padding:8px 20px;border-radius:18px;cursor:pointer;font-size:.82rem;font-weight:600;transition:.2s}
.btn:hover{background:#0f2a23}
.btn-w{background:#f5d061;color:#1a3c34}.btn-w:hover{background:#e8b800}
.btn-d{background:#c0392b;color:#fff}.btn-d:hover{background:#a93226}
.ocard{background:#f4faf6;border:1px solid #c8e0d4;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.ocard .inf{font-size:.84rem}.ocard .inf strong{color:#1a3c34}
.ocard .del{background:none;border:none;cursor:pointer;color:#c0392b;font-size:1.1rem}
.empty{text-align:center;color:#7a9b8c;padding:22px;font-size:.88rem}
.sts{background:#1a3c34;color:#f5d061;text-align:center;padding:5px;font-size:.74rem;border-radius:6px;margin-top:8px;display:none}
select option{color:#2c1810}
.refill-bar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">🧀</div>
  <div><h1>The Barkat's Heaven</h1><div style="font-size:.7rem;opacity:.8">Cold Drink Inventory - Fridge to Table</div></div>
</div>
<div class="ctr">
  <div class="nav">
    <button class="active" onclick="sw('stock')">Fridge Stock</button>
    <button onclick="sw('orders')">Serve Order</button>
    <button onclick="sw('report')">PDF Report</button>
  </div>

  <!-- STOCK TAB -->
  <div id="t-stock" class="tab">
    <div class="crd">
      <h2>Live Stock - Fridge Status</h2>
      <div class="refill-bar">
        <span style="font-size:.8rem;color:#7a9b8c">Click "Refill" to add bottles when fridge restocked</span>
        <button class="btn btn-w" onclick="ldStock()">Refresh</button>
      </div>
      <div id="sg" class="grid"></div>
      <div id="se" class="empty">Loading...</div>
    </div>
  </div>

  <!-- ORDERS TAB -->
  <div id="t-orders" class="tab" style="display:none">
    <div class="crd">
      <h2>Serve to Table (konsa drink kisko diya)</h2>
      <div class="row">
        <label>Table</label>
        <select id="ot">
          <script>for(let i=1;i<=30;i++) document.write('<option>'+i+'</option>')</script>
        </select>
        <label>Drink</label>
        <select id="od"><option>-- select drink --</option></select>
      </div>
      <div class="row">
        <label>Qty</label>
        <input id="oq" type="number" value="1" min="1" max="20">
        <label>Note</label>
        <input id="on" placeholder="masala / extra">
      </div>
      <button class="btn" onclick="serve()">Serve (Stock kam hoga)</button>
      <div id="os" class="sts"></div>
    </div>
    <div class="crd">
      <h2>Recent Orders</h2>
      <div id="ol"></div>
      <div id="oe" class="empty">No orders yet</div>
    </div>
  </div>

  <!-- REPORT TAB -->
  <div id="t-report" class="tab" style="display:none">
    <div class="crd">
      <h2>Download PDF Report</h2>
      <div class="row">
        <label>Filter</label>
        <select id="rt">
          <option value="">All Tables - Full Stock + Orders</option>
          <script>for(let i=1;i<=30;i++) document.write('<option value="'+i+'">Table '+i+'</option>')</script>
        </select>
      </div>
      <button class="btn" onclick="dlPdf()" style="margin-top:6px">Download PDF</button>
      <div id="rs" class="sts"></div>
    </div>
  </div>
</div>

<script>
let drinks = [];
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function statusLabel(s){if(s<=0)return 'Out of Stock';if(s<=5)return 'Low Stock';return 'Available';}
function statusClass(s){if(s<=0)return 'st-out';if(s<=5)return 'st-low';return 'st-ok';}

function sw(t){
  document.querySelectorAll('.tab').forEach(e=>e.style.display='none');
  document.getElementById('t-'+t).style.display='stock';
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(t==='stock')ldStock();
  if(t==='orders'){ldSel();ldOrd();}
  if(t==='report'){}
}

async function api(u,m,b){const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null});if(!r.ok){const e=await r.json();throw new Error(e.error||'err');}return r;}

// STOCK
async function ldStock(){
  try{
    const r=await api('/api/drinks');
    drinks=await r.json();
    const g=document.getElementById('sg'),e=document.getElementById('se');
    if(!drinks.length){g.innerHTML='';e.style.display='block';return;}
    e.style.display='none';
    g.innerHTML=drinks.map(d=>{
      const cls=statusClass(d.stock_qty);
      return '<div class="dc '+cls+'"><div class="nm">'+esc(d.name)+'</div><div style="font-size:.7rem;color:#8b7355">'+esc(d.category)+'</div><div class="st">'+d.stock_qty+'</div><div style="font-size:.7rem">'+statusLabel(d.stock_qty)+'</div><div class="acts"><input type="number" id="rf-'+d.id+'" value="0" min="0"><button onclick="refill('+d.id+')">Refill</button></div></div>';
    }).join('');
  }catch(e){alert(e.message);}
}

async function refill(id){
  const inp=document.getElementById('rf-'+id);
  const qty=parseInt(inp.value);
  if(!qty||qty<=0)return alert('Enter qty');
  try{
    await api('/api/drinks/'+id+'/stock','PUT',{qty});
    inp.value='0';
    ldStock();
    showMsg('Item refilled!');
  }catch(e){alert(e.message);}
}

// ORDERS
async function ldSel(){
  try{
    const r=await api('/api/drinks');
    const d=await r.json();
    const s=document.getElementById('od');
    s.innerHTML=d.length?d.map(x=>'<option value="'+x.id+'">'+esc(x.name)+' (Rs '+x.price+') - '+x.stock_qty+' left</option>').join(''):'<option>No drinks</option>';
  }catch(e){alert(e.message);}
}

async function serve(){
  const t=document.getElementById('ot').value;
  const d=document.getElementById('od').value;
  const q=parseInt(document.getElementById('oq').value)||1;
  const n=document.getElementById('on').value.trim();
  if(!d)return alert('Select drink');
  try{
    await api('/api/orders','POST',{table_number:parseInt(t),drink_id:parseInt(d),quantity:q,notes:n});
    document.getElementById('on').value='';
    document.getElementById('oq').value='1';
    ldOrd();
    showMsg('Order placed! Stock updated.');
  }catch(e){alert(e.message);}
}

async function ldOrd(){
  try{
    const r=await api('/api/orders');
    const o=await r.json();
    const l=document.getElementById('ol'),em=document.getElementById('oe');
    if(!o.length){l.innerHTML='';em.style.display='block';return;}
    em.style.display='none';
    l.innerHTML=o.slice(0,30).map(x=>{
      const nm=x.cold_drinks?esc(x.cold_drinks.name):'?';
      const pr=x.cold_drinks?x.cold_drinks.price:0;
      return '<div class="ocard"><div class="inf"><strong>Table '+x.table_number+'</strong> - '+nm+' x'+x.quantity+' = Rs '+(pr*x.quantity).toFixed(2)+(x.notes?' <small>['+esc(x.notes)+']</small>':'')+'</div><button class="del" onclick="cancelOrd('+x.id+')" title="Cancel - restore stock">x</button></div>';
    }).join('');
  }catch(e){alert(e.message);}
}

async function cancelOrd(id){
  if(!confirm('Cancel this order? Stock will be restored.'))return;
  try{await api('/api/orders/'+id,'DELETE');ldOrd();ldStock();}
  catch(e){alert(e.message);}
}

// REPORT
function dlPdf(){
  const v=document.getElementById('rt').value;
  window.open('/api/report/pdf'+(v?'?table='+v:''));
}

function showMsg(msg){
  const s=document.getElementById('os');
  s.textContent=msg;s.style.display='block';
  setTimeout(()=>s.style.display='none',2500);
}

// Init
ldStock();
</script>
</body>
</html>
